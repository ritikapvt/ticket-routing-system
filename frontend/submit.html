<!DOCTYPE html>
<html>
<head>
    <title>Ticket Routing System</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a24;
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(255,255,255,0.14);
            --text: #f0f0f8;
            --muted: #6b6b80;
            --accent: #7c6dfa;
            --accent-glow: rgba(124,109,250,0.25);

            --high: #ff5c5c;
            --high-bg: rgba(255,92,92,0.1);
            --high-border: rgba(255,92,92,0.25);

            --medium: #f5a623;
            --medium-bg: rgba(245,166,35,0.1);
            --medium-border: rgba(245,166,35,0.25);

            --low: #3ecf8e;
            --low-bg: rgba(62,207,142,0.1);
            --low-border: rgba(62,207,142,0.25);
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 60px 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .nav-link {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.08em;
            margin-bottom: 48px;
            transition: color 0.15s;
        }
        .nav-link:hover { color: var(--accent); }

        .container {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header { margin-bottom: 48px; }

        .header-eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-eyebrow::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 1px;
            background: var(--accent);
        }

        .header h2 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
            color: var(--text);
        }

        .header h2 span { color: var(--accent); }

        .section-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .submit-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 48px;
            transition: border-color 0.2s;
        }

        .submit-box:focus-within {
            border-color: var(--border-hover);
        }

        /* two-column grid for name + email, full-width for subject + description */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .form-field.full {
            grid-column: 1 / -1;
        }

        .field-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* shared input/textarea styles */
        .form-field input,
        .form-field textarea {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-field input::placeholder,
        .form-field textarea::placeholder { color: var(--muted); }

        .form-field input:focus,
        .form-field textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* description textarea */
        #description {
            resize: vertical;
            min-height: 110px;
            line-height: 1.6;
        }

        .form-divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        .submit-row {
            display: flex;
            justify-content: flex-end;
        }

        button { font-family: 'Syne', sans-serif; cursor: pointer; }

        .btn-submit {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 13px 28px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.02em;
            white-space: nowrap;
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-submit:hover {
            opacity: 0.88;
            box-shadow: 0 0 28px rgba(124,109,250,0.4);
        }

        .btn-submit:active { transform: scale(0.97); }

        #result {
            margin-top: 20px;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            color: var(--muted);
            min-height: 18px;
            line-height: 1.7;
            transition: color 0.2s;
        }

        #result strong {
            color: var(--text);
            font-weight: 500;
        }

        .tickets-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .tickets-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .btn-load {
            background: var(--surface);
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }

        .btn-load:hover {
            color: var(--text);
            border-color: var(--border-hover);
            background: var(--surface2);
        }

        #tickets {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ticket {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid var(--border);
            transition: border-color 0.2s, transform 0.15s;
            animation: slideIn 0.25s ease both;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ticket:hover {
            border-color: var(--border-hover);
            transform: translateX(3px);
        }

        .ticket-bar {
            width: 3px;
            height: 36px;
            border-radius: 99px;
            flex-shrink: 0;
        }

        .high .ticket-bar { background: var(--high); }
        .medium .ticket-bar { background: var(--medium); }
        .low .ticket-bar { background: var(--low); }

        .ticket.high, .ticket.medium, .ticket.low {
            background: var(--surface);
            color: var(--text);
        }

        .ticket-body { flex: 1; min-width: 0; }

        .ticket-desc {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .ticket-category {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .ticket-priority {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 6px;
            flex-shrink: 0;
            letter-spacing: 0.04em;
        }

        .high .ticket-priority {
            color: var(--high);
            background: var(--high-bg);
            border: 1px solid var(--high-border);
        }

        .medium .ticket-priority {
            color: var(--medium);
            background: var(--medium-bg);
            border: 1px solid var(--medium-border);
        }

        .low .ticket-priority {
            color: var(--low);
            background: var(--low-bg);
            border: 1px solid var(--low-border);
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: 12px;
        }

        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-field.full { grid-column: 1; }
        }
    </style>
</head>

<body>
    <div class="container">

        <a href="/dashboard" class="nav-link">← Go to Dashboard</a>

        <div class="header">
            <div class="header-eyebrow">CloudSync</div>
            <h2>Ticket <span>Routing</span><br>System</h2>
        </div>

        <p class="section-label">Submit a ticket</p>
        <div class="submit-box">

            <div class="form-grid">

                <div class="form-field">
                    <label class="field-label" for="name">Name</label>
                    <input type="text" id="name" placeholder="Your full name" />
                </div>

                <div class="form-field">
                    <label class="field-label" for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" />
                </div>

                <div class="form-field full">
                    <label class="field-label" for="subject">Subject</label>
                    <input type="text" id="subject" placeholder="Brief summary of your issue" />
                </div>

                <div class="form-field full">
                    <label class="field-label" for="description">Description</label>
                    <textarea id="description" placeholder="Describe your issue in detail..."></textarea>
                </div>

            </div>

            <div class="form-divider"></div>

            <div class="submit-row">
                <button class="btn-submit" onclick="submitTicket()">Submit Ticket</button>
            </div>

            <p id="result"></p>
        </div>

        <div class="tickets-header">
            <p class="tickets-title">My Tickets</p>
            <button class="btn-load" onclick="loadTickets()">Show All Tickets</button>
        </div>
        <div id="tickets">
            <div class="empty">No tickets loaded yet</div>
        </div>

    </div>

    <script>
        async function submitTicket() {
            try {
                const name = document.getElementById("name").value;
                const email = document.getElementById("email").value;
                const subject = document.getElementById("subject").value;
                const desc = document.getElementById("description").value;

                if (!desc.trim()) {
                    alert("Please enter an issue");
                    return;
                }

                console.log("Sending request...");

                const response = await fetch("/submit_ticket", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        subject: subject,
                        description: desc
                    })
                });

                console.log("Response received:", response);

                if (!response.ok) {
                    throw new Error("Server error");
                }
                const data = await response.json();
                console.log("Data:", data);

                const message = `
                    Thank you for reaching out! Your request has been received.<br><br>
                    <strong>Category:</strong> ${data.category} &nbsp;|&nbsp;
                    <strong>Priority:</strong> ${data.priority}<br><br>
                    Our team will get back to you shortly. We appreciate your patience.
                `;

                localStorage.setItem("ticketMessage", message);
                document.getElementById("result").innerHTML = message;

                document.getElementById("description").value = "";

            } catch (error) {
                console.error("Error:", error);
                alert("Something went wrong. Check console.");
            }
        }

        async function loadTickets() {
            const response = await fetch("/tickets");
            const data = await response.json();

            const list = document.getElementById("tickets");
            list.innerHTML = "";

            if (!data.length) {
                list.innerHTML = '<div class="empty">No tickets found</div>';
                return;
            }

            data.forEach((ticket, i) => {
                const div = document.createElement("div");
                let priorityClass = ticket.priority.toLowerCase();
                div.className = "ticket " + priorityClass;
                div.style.animationDelay = (i * 0.05) + "s";
                div.innerHTML = `
                    <div class="ticket-bar"></div>
                    <div class="ticket-body">
                        <div class="ticket-desc">${ticket.subject}</div>
                        <div class="ticket-category">${ticket.category} • ${ticket.timestamp}</div>
                    </div>
                    <span class="ticket-priority">${ticket.priority}</span>
                `;
                list.appendChild(div);
            });
        }

        window.onload = function () {
            const savedMessage = localStorage.getItem("ticketMessage");

            if (savedMessage) {
                document.getElementById("result").innerHTML = savedMessage;
                localStorage.removeItem("ticketMessage");
            }
        };

    </script>

</body>
</html>
